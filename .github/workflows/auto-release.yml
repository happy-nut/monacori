name: Weekly auto patch release

# 매주 일요일 00:00 KST(= UTC 토요일 15:00)에 실행한다. 지난 v* 릴리스 태그 이후 커밋이 하나라도
#있으면 patch(0.0.1)만 자동으로 올려서 배포한다. minor/major(예: 0.1.0)는 사람이 직접 올린다:
#   npm version <minor|major> && git push --follow-tags   (그 태그 push는 publish.yml이 처리)
#
# GITHUB_TOKEN으로 push한 태그는 다른 워크플로우(publish.yml의 on.push.tags)를 트리거하지 않으므로,
# 이 워크플로우가 버전업 + 태그 + 배포까지 한 번에 끝낸다.
on:
  schedule:
    - cron: "0 15 * * 6" # UTC 토 15:00 == KST 일 00:00
  workflow_dispatch: {}

# 태그/커밋 push에 contents:write, npm Trusted Publishing(OIDC)에 id-token:write가 필요하다.
permissions:
  contents: write
  id-token: write

# 수동 publish.yml과 동시에 두 번 배포되지 않도록 직렬화한다.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  auto-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # describe/rev-list가 전체 히스토리와 태그를 봐야 한다

      # 지난 릴리스 태그 이후 변경이 있는지 확인한다. 없으면 이후 스텝을 모두 건너뛴다.
      - name: Detect changes since last release
        id: gate
        run: |
          set -euo pipefail
          last="$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || true)"
          if [ -z "$last" ]; then
            echo "아직 v* 태그가 없습니다 — 첫 릴리스는 수동으로 끊어 주세요. 건너뜁니다."
            echo "go=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          count="$(git rev-list "$last"..HEAD --count)"
          echo "마지막 릴리스: $last — 이후 커밋 $count개."
          if [ "$count" -gt 0 ]; then echo "go=true" >> "$GITHUB_OUTPUT"; else echo "go=false" >> "$GITHUB_OUTPUT"; fi

      - name: Set up Node
        if: steps.gate.outputs.go == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      # Trusted Publishing은 npm >= 11.5.1이 필요하다(러너 기본보다 최신).
      - name: Upgrade npm
        if: steps.gate.outputs.go == 'true'
        run: npm install -g npm@latest

      - name: Install dependencies
        if: steps.gate.outputs.go == 'true'
        run: npm ci

      - name: Configure git as release bot
        if: steps.gate.outputs.go == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # patch만 올린다(0.0.1). npm version이 커밋 + v* 태그를 만든다. [skip ci]로 불필요한 재실행을 막는다.
      - name: Bump patch version
        if: steps.gate.outputs.go == 'true'
        run: |
          npm version patch -m "chore(release): v%s [skip ci]"

      - name: Push commit and tag
        if: steps.gate.outputs.go == 'true'
        run: git push --follow-tags

      # NODE_AUTH_TOKEN 없음: @happy-nut/monacori에 Trusted Publisher가 설정돼 있어 OIDC로 인증한다.
      # npm publish가 prepare 스크립트(npm run build)로 dist를 빌드한 뒤 패킹한다.
      - name: Publish to npm
        if: steps.gate.outputs.go == 'true'
        run: npm publish
