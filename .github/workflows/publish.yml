name: Publish to npm

# Zero-token, zero-OTP publishing via npm Trusted Publishing (OIDC).
# Push a v* tag (e.g. `npm version patch && git push --follow-tags`) to release,
# or run this workflow manually from the Actions tab.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write # required: lets npm verify this workflow via OIDC + adds provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      # Trusted Publishing requires npm >= 11.5.1 (newer than the runner default).
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      # Gate the release on the core-user-flow tests — a red build never ships.
      - name: Run tests
        run: npm test

      # No NODE_AUTH_TOKEN: npm authenticates to the registry via OIDC because a
      # Trusted Publisher is configured for @happy-nut/monacori on npmjs.com.
      - name: Publish
        run: npm publish
